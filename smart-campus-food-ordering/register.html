<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Campus Food Ordering System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Smart Campus Food Ordering System</h1>
    <p>Create Account</p>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<main>
    <section class="register-form">
        <h2>Register Account</h2>

        <form name="registerForm" onsubmit="return validateRegister()">
            <label>Full Name:</label>
            <input type="text" name="registerName">

            <label>Email:</label>
            <input type="email" name="registerEmail">

            <label>Password:</label>
            <input type="password" name="registerPassword">

            <label>Confirm Password:</label>
            <input type="password" name="confirmPassword">

            <input type="submit" value="Register">
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 Smart Campus Food Ordering System</p>
</footer>

<script src="script.js"></script>

</body>
</html>
